apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-green-cell-stable-nginx
  namespace: app
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
      }

      location = /stub_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
      }

      location / {
        default_type text/plain;
        return 200 'blue-green-cell stable v1\n';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-green-cell-stable
  namespace: app
  labels:
    app: blue-green-cell
    release-track: stable
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-green-cell
      release-track: stable
  template:
    metadata:
      labels:
        app: blue-green-cell
        release-track: stable
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9113"
    spec:
      containers:
      - name: app
        image: nginxinc/nginx-unprivileged:1.29-alpine
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      - name: metrics
        image: nginx/nginx-prometheus-exporter:1.4.2
        args:
        - -nginx.scrape-uri=http://127.0.0.1:8080/stub_status
        ports:
        - containerPort: 9113
          name: metrics
      volumes:
      - name: nginx-config
        configMap:
          name: blue-green-cell-stable-nginx
